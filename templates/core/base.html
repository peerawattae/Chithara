<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Chitra{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --border: #2a2a3a;
            --accent: #c8a96e;
            --accent2: #7c6fd4;
            --text: #e8e6f0;
            --muted: #6b6880;
            --success: #4caf7d;
            --fail: #e05c5c;
            --pending: #e0a84a;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            min-height: 100vh;
        }

        /* ── Nav ── */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.2rem 2.5rem;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: 0.02em;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: color 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--accent);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.4rem;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--accent);
            color: #0a0a0f;
        }

        .btn-primary:hover {
            background: #d4b87a;
            transform: translateY(-1px);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ── Main layout ── */
        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2.5rem 2rem;
        }

        /* ── Status badges ── */
        .badge {
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .badge-success {
            background: rgba(76, 175, 125, 0.15);
            color: var(--success);
        }

        .badge-failed {
            background: rgba(224, 92, 92, 0.15);
            color: var(--fail);
        }

        .badge-pending {
            background: rgba(224, 168, 74, 0.15);
            color: var(--pending);
        }

        .badge-progress {
            background: rgba(124, 111, 212, 0.15);
            color: var(--accent2);
        }

        /* ── Toast notifications ── */
        #toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .toast-msg {
            padding: 0.8rem 1.4rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            animation: slideIn 0.3s ease;
            max-width: 320px;
        }

        .toast-success {
            background: var(--success);
            color: #fff;
        }

        .toast-error {
            background: var(--fail);
            color: #fff;
        }

        .toast-info {
            background: var(--accent2);
            color: #fff;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* ── Loading spinner ── */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Empty state ── */
        .empty-state {
            text-align: center;
            padding: 5rem 2rem;
            color: var(--muted);
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            font-family: 'Playfair Display', serif;
            color: var(--text);
            margin-bottom: 0.5rem;
        }
    </style>
    {% block extra_styles %}{% endblock %}
</head>

<body>
    <nav>
        <a href="/library/" class="nav-logo">Chitra</a>
        <div class="nav-links">
            <a href="/library/" id="nav-library">Library</a>
            <a href="/create/" id="nav-create">Create</a>
            <a href="/create/" class="btn btn-primary">+ New Song</a>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <div id="toast"></div>

    <script>
        // Highlight active nav link
        const path = window.location.pathname;
        document.querySelectorAll('.nav-links a[id]').forEach(a => {
            if (path.startsWith(a.getAttribute('href'))) a.classList.add('active');
        });

        // Toast utility
        function showToast(msg, type = 'info') {
            const t = document.getElementById('toast');
            const el = document.createElement('div');
            el.className = `toast-msg toast-${type}`;
            el.textContent = msg;
            t.appendChild(el);
            setTimeout(() => el.remove(), 3500);
        }

        // Badge helper
        function statusBadge(status) {
            const map = {
                success: 'badge-success',
                failed: 'badge-failed',
                in_progress: 'badge-progress',
                pending: 'badge-pending',
            };
            return `<span class="badge ${map[status] || 'badge-pending'}">${status}</span>`;
        }
    </script>
    {% block extra_scripts %}{% endblock %}
</body>

</html>
