{% extends "core/base.html" %}
{% block title %}Shared Song — Chitra{% endblock %}

{% block extra_styles %}
<style>
    .shared-layout {
        max-width: 640px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 2rem;
    }

    .shared-cover {
        width: 100%;
        aspect-ratio: 2/1;
        border-radius: var(--radius);
        overflow: hidden;
        background: linear-gradient(135deg, #1e1e2e, #2a1f3d);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 4rem;
        opacity: 0.5;
        position: relative;
    }

    .shared-cover img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        position: absolute;
        inset: 0;
        opacity: 1;
    }

    .shared-info {
        text-align: center;
    }

    .shared-title {
        font-family: 'Playfair Display', serif;
        font-size: 2rem;
        font-weight: 400;
    }

    .shared-by {
        color: var(--muted);
        font-size: 0.875rem;
        margin-top: 0.4rem;
    }

    .player {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.5rem;
    }

    .progress-container {
        position: relative;
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        cursor: pointer;
        margin: 1rem 0 0.5rem;
    }

    .progress-container:hover {
        height: 6px;
    }

    .progress-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 2px;
        pointer-events: none;
    }

    .time-display {
        display: flex;
        justify-content: space-between;
        font-size: 0.75rem;
        color: var(--muted);
    }

    .controls {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        margin: 1.2rem 0;
    }

    .ctrl-btn {
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 1.1rem;
        padding: 0.5rem;
        border-radius: 50%;
        transition: all 0.15s;
    }

    .ctrl-btn:hover {
        color: var(--text);
        background: var(--border);
    }

    .play-btn {
        width: 56px;
        height: 56px;
        background: var(--accent);
        border: none;
        border-radius: 50%;
        color: #0a0a0f;
        font-size: 1.4rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 20px rgba(200, 169, 110, 0.3);
        transition: transform 0.15s;
    }

    .play-btn:hover {
        transform: scale(1.08);
    }

    .shared-badge {
        text-align: center;
        padding: 1rem;
        background: rgba(200, 169, 110, 0.08);
        border: 1px solid rgba(200, 169, 110, 0.2);
        border-radius: var(--radius);
        font-size: 0.8rem;
        color: var(--muted);
    }

    .shared-badge a {
        color: var(--accent);
        text-decoration: none;
    }

    .shared-badge a:hover {
        text-decoration: underline;
    }
</style>
{% endblock %}

{% block content %}
<div id="loading" style="text-align:center;padding:5rem;">
    <div class="spinner" style="width:40px;height:40px;margin:0 auto 1rem;"></div>
    <p style="color:var(--muted);">Loading shared song…</p>
</div>

<div class="shared-layout" id="layout" style="display:none;">
    <div class="shared-cover" id="s-cover"><span>♪</span></div>

    <div class="shared-info">
        <h1 class="shared-title" id="s-title">—</h1>
        <p class="shared-by" id="s-by"></p>
        <div style="margin-top:0.5rem;" id="s-tags"></div>
    </div>

    <div class="player">
        <div class="progress-container" id="prog" onclick="seek(event)">
            <div class="progress-fill" id="pfill" style="width:0%"></div>
        </div>
        <div class="time-display">
            <span id="tc">0:00</span>
            <span id="tt">0:00</span>
        </div>
        <div class="controls">
            <button class="ctrl-btn" onclick="skip(-10)">⟨⟨</button>
            <button class="play-btn" id="pbtn" onclick="togglePlay()">▶</button>
            <button class="ctrl-btn" onclick="skip(10)">⟩⟩</button>
        </div>
    </div>

    <div class="shared-badge">
        Shared via <a href="/">Chitra</a> ·
        <a href="/login/">Sign in</a> to create your own songs
    </div>
</div>

<audio id="audio"></audio>
{% endblock %}

{% block extra_scripts %}
<script>
    const API = '/api';
    const SONG_ID = {{ song_id }};
    const audio = document.getElementById('audio');

    async function load() {
        try {
            const res = await fetch(`${API}/songs/shared/${SONG_ID}/`);
            if (!res.ok) throw new Error('This song is not available');
            const s = await res.json();

            document.getElementById('s-title').textContent = s.title;
            document.getElementById('s-by').textContent = `by ${s.created_by}`;

            if (s.cover_image)
                document.getElementById('s-cover').innerHTML =
                    `<img src="${s.cover_image}" alt="${s.title}">`;

            if (s.form_details) {
                const tags = [s.form_details.genre, s.form_details.occasion].filter(Boolean);
                document.getElementById('s-tags').innerHTML =
                    tags.map(t => `<span style="display:inline-block;padding:0.2rem 0.7rem;border:1px solid var(--border);border-radius:20px;font-size:0.75rem;color:var(--muted);margin:0.2rem">${t}</span>`).join('');
            }

            if (s.song_link) { audio.src = s.song_link; audio.load(); }

            document.getElementById('loading').style.display = 'none';
            document.getElementById('layout').style.display = 'flex';
        } catch (e) {
            document.getElementById('loading').innerHTML =
                `<div class="empty-state"><div class="icon">🔒</div><h3>${e.message}</h3></div>`;
        }
    }

    function togglePlay() {
        if (audio.paused) { audio.play(); document.getElementById('pbtn').textContent = '⏸'; }
        else { audio.pause(); document.getElementById('pbtn').textContent = '▶'; }
    }

    function skip(s) { audio.currentTime = Math.max(0, Math.min(audio.currentTime + s, audio.duration || 0)); }

    function seek(e) {
        if (!audio.duration) return;
        const r = document.getElementById('prog').getBoundingClientRect();
        audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
    }

    audio.addEventListener('timeupdate', () => {
        if (!audio.duration) return;
        const p = (audio.currentTime / audio.duration) * 100;
        document.getElementById('pfill').style.width = p + '%';
        document.getElementById('tc').textContent = fmt(audio.currentTime);
    });
    audio.addEventListener('loadedmetadata', () => {
        document.getElementById('tt').textContent = fmt(audio.duration);
    });
    audio.addEventListener('ended', () => { document.getElementById('pbtn').textContent = '▶'; });

    function fmt(s) {
        if (!s || isNaN(s)) return '0:00';
        return `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, '0')}`;
    }

    load();
</script>
{% endblock %}
