<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in — Chitra</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --border: #2a2a3a;
            --accent: #c8a96e;
            --text: #e8e6f0;
            --muted: #6b6880;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 420px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 3rem 2.5rem;
            text-align: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .tagline {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 3rem;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            width: 100%;
            padding: 0.9rem 1.5rem;
            background: #fff;
            color: #1f1f1f;
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s, box-shadow 0.15s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .google-btn:hover {
            background: #f5f5f5;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        }

        .google-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 2rem 0;
            color: var(--muted);
            font-size: 0.8rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .features {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            margin-top: 2.5rem;
            text-align: left;
        }

        .feature {
            display: flex;
            gap: 0.8rem;
            align-items: flex-start;
            font-size: 0.85rem;
            color: var(--muted);
        }

        .feature-icon {
            font-size: 1rem;
            flex-shrink: 0;
            margin-top: 1px;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="logo">Chitra</div>
        <p class="tagline">AI-powered music creation</p>

        <!-- Google OAuth sign in -->
        <a href="{% url 'social:begin' 'google-oauth2' %}" class="google-btn">
            <!-- Google G logo SVG -->
            <svg class="google-icon" viewBox="0 0 24 24">
                <path fill="#4285F4"
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                <path fill="#34A853"
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                <path fill="#FBBC05"
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                <path fill="#EA4335"
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
            </svg>
            Sign in with Google
        </a>

        <div class="divider">what you get</div>

        <div class="features">
            <div class="feature">
                <span class="feature-icon">🎵</span>
                <span>Generate AI songs from your creative prompts</span>
            </div>
            <div class="feature">
                <span class="feature-icon">📚</span>
                <span>Personal library of all your created songs</span>
            </div>
            <div class="feature">
                <span class="feature-icon">↗</span>
                <span>Share songs with anyone via a link</span>
            </div>
            <div class="feature">
                <span class="feature-icon">↓</span>
                <span>Download your songs as MP3</span>
            </div>
        </div>
    </div>
</body>

</html>
